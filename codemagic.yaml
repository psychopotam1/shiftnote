workflows:
  ios_release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - flutter pub get
      - flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration

    integrations:
      app_store_connect: filmunit